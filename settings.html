<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | NexGen Electronics</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo" style="display: flex; align-items: center;">
                    <img src="images/logo.webp" alt="NexGen Logo" style="height: 32px; width: auto;">
                </a>
            </div>
            
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><i class="ph ph-squares-four"></i> Overview</a></li>
                <li><a href="projects.html"><i class="ph ph-circuitry"></i> My Projects</a></li>
                <li><a href="quotations.html"><i class="ph ph-file-text"></i> Quotations</a></li>
                <li><a href="analytics.html"><i class="ph ph-chart-line-up"></i> Analytics</a></li>
                <li><a href="messages.html"><i class="ph ph-envelope"></i> Messages <span style="background: var(--clr-primary); color: var(--clr-secondary); padding: 2px 6px; border-radius: 10px; font-size: 0.75rem; margin-left: auto;">3</span></a></li>
            </ul>
            
            <div class="sidebar-footer">
                <ul class="sidebar-nav" style="padding: 0;">
                    <li><a href="settings.html" class="active"><i class="ph ph-gear"></i> Settings</a></li>
                    <li><a href="index.html"><i class="ph ph-sign-out"></i> Logout</a></li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dash-header">
                <div>
                    <!-- Mobile toggle placeholder -->
                </div>
                <div class="dash-user">
                    <i class="ph ph-bell" style="font-size: 1.25rem; margin-right: 16px; cursor: pointer;"></i>
                    <img src="https://ui-avatars.com/api/?name=User&background=0A192F&color=00D2FF" alt="User Avatar">
                    <span id="user-email-display">Loading...</span>
                </div>
            </header>
            
            <div class="dash-content">
                <h1 class="dash-title dash-anim">Settings</h1>
                
                <div class="dash-anim" style="display: flex; gap: 30px; animation-delay: 0.1s; margin-top: 20px; flex-wrap: wrap;">
                    <!-- Settings Sidebar -->
                    <div style="width: 250px; flex-shrink: 0;">
                        <ul style="list-style: none; padding: 0;">
                            <li style="margin-bottom: 8px;"><a href="#" style="display: block; padding: 12px 16px; background: rgba(0, 210, 255, 0.1); color: var(--clr-primary-dark); border-radius: 8px; font-weight: 600; text-decoration: none;"><i class="ph ph-user" style="margin-right: 8px;"></i> Account Profile</a></li>
                            <li style="margin-bottom: 8px;"><a href="#" style="display: block; padding: 12px 16px; color: var(--clr-text); border-radius: 8px; font-weight: 500; text-decoration: none; transition: background 0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='transparent'"><i class="ph ph-buildings" style="margin-right: 8px;"></i> Company Details</a></li>
                            <li style="margin-bottom: 8px;"><a href="#" style="display: block; padding: 12px 16px; color: var(--clr-text); border-radius: 8px; font-weight: 500; text-decoration: none; transition: background 0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='transparent'"><i class="ph ph-bell" style="margin-right: 8px;"></i> Notifications</a></li>
                            <li style="margin-bottom: 8px;"><a href="#" style="display: block; padding: 12px 16px; color: var(--clr-text); border-radius: 8px; font-weight: 500; text-decoration: none; transition: background 0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='transparent'"><i class="ph ph-credit-card" style="margin-right: 8px;"></i> Billing & Invoices</a></li>
                            <li style="margin-bottom: 8px;"><a href="#" style="display: block; padding: 12px 16px; color: var(--clr-text); border-radius: 8px; font-weight: 500; text-decoration: none; transition: background 0.2s;" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='transparent'"><i class="ph ph-shield-check" style="margin-right: 8px;"></i> Security & NDA</a></li>
                        </ul>
                    </div>
                    
                    <!-- Settings Content -->
                    <div style="flex: 1; min-width: 300px; background: var(--clr-white); border: 1px solid #eaeaea; border-radius: 8px; padding: 30px; box-shadow: var(--shadow-sm);">
                        <h3 style="margin-bottom: 24px; color: var(--clr-secondary); font-family: var(--font-heading); border-bottom: 1px solid #eaeaea; padding-bottom: 16px;">Account Profile</h3>
                        
                        <div style="display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap;">
                            <div style="width: 100px; height: 100px; border-radius: 50%; background: #eaeaea; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                                <img src="https://ui-avatars.com/api/?name=User&background=0A192F&color=00D2FF&size=100" alt="Avatar" id="settings-avatar" style="width: 100%; height: 100%;">
                                <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 30%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;">
                                    <i class="ph ph-camera"></i>
                                </div>
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                                <h4 style="margin-bottom: 8px; color: var(--clr-secondary); font-size: 1.1rem;">Profile Picture</h4>
                                <p style="font-size: 0.85rem; color: var(--clr-text); margin-bottom: 12px;">JPG, GIF or PNG. Max size of 800K</p>
                                <div style="display: flex; gap: 12px;">
                                    <button style="background: var(--clr-primary); color: var(--clr-secondary); border: none; padding: 6px 16px; border-radius: 6px; font-weight: 500; font-size: 0.85rem; cursor: pointer;">Upload New</button>
                                    <button style="background: #fdfdfd; color: var(--clr-text); border: 1px solid #eaeaea; padding: 6px 16px; border-radius: 6px; font-weight: 500; font-size: 0.85rem; cursor: pointer;">Remove</button>
                                </div>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;">
                            <div>
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--clr-secondary); margin-bottom: 8px;">Full Name</label>
                                <input type="text" value="John Doe" id="settings-name-input" style="width: 100%; padding: 10px; border: 1px solid #eaeaea; border-radius: 6px; font-family: var(--font-body); font-size: 0.9rem; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--clr-secondary); margin-bottom: 8px;">Job Title</label>
                                <input type="text" value="Hardware Engineer" style="width: 100%; padding: 10px; border: 1px solid #eaeaea; border-radius: 6px; font-family: var(--font-body); font-size: 0.9rem; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--clr-secondary); margin-bottom: 8px;">Email Address</label>
                                <input type="email" id="settings-email-input" value="user@example.com" style="width: 100%; padding: 10px; border: 1px solid #eaeaea; border-radius: 6px; font-family: var(--font-body); font-size: 0.9rem; outline: none;" readonly>
                            </div>
                            <div>
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--clr-secondary); margin-bottom: 8px;">Phone Number</label>
                                <input type="text" value="+1 (555) 123-4567" style="width: 100%; padding: 10px; border: 1px solid #eaeaea; border-radius: 6px; font-family: var(--font-body); font-size: 0.9rem; outline: none;">
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 24px;">
                            <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--clr-secondary); margin-bottom: 8px;">Preferred Assembly Line Access</label>
                            <select style="width: 100%; padding: 10px; border: 1px solid #eaeaea; border-radius: 6px; font-family: var(--font-body); font-size: 0.9rem; outline: none; background: white;">
                                <option>SMT Line Alpha (High Mix, Low Volume)</option>
                                <option>SMT Line Beta (High Volume)</option>
                                <option>Rapid Prototyping Cell</option>
                            </select>
                        </div>
                        
                        <div style="display: flex; justify-content: flex-end; border-top: 1px solid #eaeaea; padding-top: 20px; margin-top: 20px;">
                            <button style="background: var(--clr-primary); color: var(--clr-secondary); border: none; padding: 10px 24px; border-radius: 6px; font-weight: 600; font-size: 0.95rem; cursor: pointer;">Save Changes</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userEmail = localStorage.getItem('loggedInUser');
            if (userEmail) {
                document.getElementById('user-email-display').textContent = userEmail;
                
                // Update settings input as well
                const emailInput = document.getElementById('settings-email-input');
                if(emailInput) emailInput.value = userEmail;
                
                const namePart = userEmail.split('@')[0];
                const capitalized = namePart.charAt(0).toUpperCase() + namePart.slice(1);
                
                const nameInput = document.getElementById('settings-name-input');
                if(nameInput) nameInput.value = capitalized;

                const avatarImg = document.querySelector('.dash-user img');
                const settingsAvatar = document.getElementById('settings-avatar');
                const avatarSrc = `https://ui-avatars.com/api/?name=${encodeURIComponent(capitalized)}&background=0A192F&color=00D2FF`;
                
                if (avatarImg) {
                    avatarImg.src = avatarSrc;
                }
                if (settingsAvatar) {
                    settingsAvatar.src = avatarSrc + "&size=100";
                }
            } else {
                document.getElementById('user-email-display').textContent = 'Guest User';
            }
        });
    </script>
</body>
</html>
