<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | NexGen Electronics</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-404">
        <!-- Abstract background elements -->
        <div style="position: absolute; top: -100px; left: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, transparent 70%);"></div>
        <div style="position: absolute; bottom: -100px; right: -100px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,210,255,0.05) 0%, transparent 70%);"></div>
        
        <div class="content-404 fade-in-up active">
            <a href="index.html" style="display: flex; justify-content: center; margin-bottom: 24px;">
                <img src="images/logo.webp" alt="NexGen Logo" style="height: 48px; width: auto;">
            </a>
            <h1 class="title-404">404</h1>
            <h2 style="color: var(--clr-white); font-size: 2.5rem; margin-bottom: 16px; font-family: var(--font-heading);">Circuit Broken</h2>
            <p class="desc-404" style="max-width: 500px; margin: 0 auto 40px auto; font-size: 1.125rem; color: var(--clr-heading);">
                The page you are looking for has been disconnected or moved to another server. Let's get you back to the main circuit.
            </p>
            
            <a href="index.html" class="btn btn-primary btn-glow">
                <i class="ph ph-house"></i> Return to Homepage
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
