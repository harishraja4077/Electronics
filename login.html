<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | NexGen Electronics</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-split">
        <!-- Left Side: Branding/Image -->
        <div class="auth-split-left"
            style="background-image: url('file:///C:/Users/R%20Harish/.gemini/antigravity-ide/brain/c568c726-3d5c-4287-bbd8-9553e764aa75/electronics_hero_bg_1780980336880.png');">
            <div class="auth-split-overlay"></div>
            <div class="auth-split-content">
                <a href="index.html" class="logo"
                    style="display: flex; align-items: center; justify-content: center; margin-bottom: 40px;">
                    <img src="images/logo.webp" alt="NexGen Logo" style="height: 48px; width: auto;">
                </a>
                <h1 class="dash-anim">Client Portal</h1>
                <p class="dash-anim" style="animation-delay: 0.1s;">Manage your manufacturing projects, track assembly
                    progress, and view live QA metrics.</p>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-split-right">
            <div class="auth-form-wrapper dash-anim" style="animation-delay: 0.2s;">
                <h2 style="color: var(--clr-secondary); margin-bottom: 30px; text-align: center;">Welcome Back</h2>

                <form id="loginForm" action="dashboard.html" method="GET">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="john.doe@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="auth-links"
                        style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 30px;">
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="404.html">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-glow" style="width: 100%;">Sign In</button>
                </form>

                <div style="margin-top: 30px; text-align: center; color: var(--clr-text); font-size: 0.9rem;">
                    Don't have an account? <a href="404.html"
                        style="color: var(--clr-primary-dark); font-weight: 500;">Request Access</a>
                </div>

                <div style="margin-top: 20px; text-align: center;">
                    <a href="index.html"
                        style="font-size: 0.85rem; color: var(--clr-text); display: inline-flex; align-items: center; gap: 4px;"><i
                            class="ph ph-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            localStorage.setItem("loggedInUser", email);
            window.location.href = "dashboard.html";
        });
    </script>
</body>

</html>
